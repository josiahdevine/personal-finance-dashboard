[build]
  command = "set \"CI=false\" && npm run build"
  publish = "build"
  functions = "functions"

[build.environment]
  CI = "false"
  NODE_ENV = "production"
  GENERATE_SOURCEMAP = "false"
  REACT_APP_ENV = "production"
  REACT_APP_DOMAIN = "trypersonalfinance.com"
  REACT_APP_API_URL = "https://api.trypersonalfinance.com"
  REACT_APP_DEPLOY_PLATFORM = "netlify"
  REACT_APP_FIREBASE_AUTH_DOMAIN = "personal-finance-dashboa-f76f6.firebaseapp.com"
  REACT_APP_FIREBASE_PROJECT_ID = "personal-finance-dashboa-f76f6"

# Global headers for all paths
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Max-Age = "86400"
    # Add custom headers for better debugging
    X-Environment = "production"
    X-Deployed-From = "netlify"

# Handle OPTIONS preflight requests for all API endpoints on the API subdomain
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/cors-preflight"
  status = 204
  force = true
  conditions = {Host = ["api.trypersonalfinance.com"], Method = ["OPTIONS"]}
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# Handle OPTIONS preflight requests for all local API paths
[[redirects]]
  from = "/api/*"
  to = "/api/:splat"
  status = 204
  force = true
  conditions = {Method = ["OPTIONS"]}
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# Handle requests coming to the api subdomain - redirect to Netlify Functions
[[redirects]]
  from = "https://api.trypersonalfinance.com/*"
  to = "https://trypersonalfinance.com/.netlify/functions/:splat"
  status = 200
  force = true
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# Alternative API subdomain redirect
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
  conditions = {Host = ["api.trypersonalfinance.com"]}
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# Handle /api/ path on main domain as fallback
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
  [redirects.headers]
    Access-Control-Allow-Origin = "*"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# Special redirect for authentication 
[[redirects]]
  from = "/.auth/*"
  to = "https://personal-finance-dashboa-f76f6.firebaseapp.com/.auth/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

