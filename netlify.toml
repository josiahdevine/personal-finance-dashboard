  FIREBASE_CLIENT_EMAIL = ""  # Add your Firebase client email here
  FIREBASE_PRIVATE_KEY = ""  # Add your Firebase private key here

# Netlify Functions plugin to ensure dependencies are installed correctly
[[plugins]]
  package = "@netlify/plugin-functions-install-core"

# Global headers for all paths
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Content-Security-Policy = "default-src 'self' https://*.trypersonalfinance.com https://*.firebase.app https://*.firebaseapp.com; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://www.googletagmanager.com https://ajax.googleapis.com https://*.firebaseio.com https://*.firebase.app https://*.firebaseapp.com https://cdn.plaid.com https://js.stripe.com https://*.plaid.com https://*.generativeai.google; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; img-src 'self' data: https:; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.trypersonalfinance.com https://api.trypersonalfinance.com https://*.googleapis.com https://*.firebaseio.com https://*.firebase.com https://*.firebaseapp.com https://firestore.googleapis.com https://securetoken.googleapis.com https://identitytoolkit.googleapis.com https://firebaseinstallations.googleapis.com https://firebaseremoteconfig.googleapis.com https://firebaselogging-pa.googleapis.com https://api.stripe.com https://hooks.stripe.com https://r.stripe.com https://m.stripe.network https://q.stripe.com https://*.netlify.app https://*.firebaseio.com https://www.googleapis.com https://www.gstatic.com https://generativelanguage.googleapis.com https://cdn.plaid.com https://*.plaid.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://*.stripe.com https://*.firebaseapp.com https://cdn.plaid.com https://*.plaid.com"
    X-Environment = "production"
    X-Deployed-From = "netlify"

# Handle /api/ path on main domain - consolidated for better management
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true
  [redirects.headers]
    Access-Control-Allow-Origin = "https://trypersonalfinance.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"
    Cache-Control = "no-cache"

# Enhanced CORS preflight handling for OPTIONS requests to all API routes
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/cors-preflight"
  status = 204
  force = true
  conditions = {Method = ["OPTIONS"]}
  [redirects.headers]
    Access-Control-Allow-Origin = "https://trypersonalfinance.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# API subdomain preflight handling - unified approach
[[redirects]]
  from = "https://api.trypersonalfinance.com/*"
  to = "/.netlify/functions/cors-preflight"
  status = 204
  force = true
  conditions = {Method = ["OPTIONS"]}
  [redirects.headers]
    Access-Control-Allow-Origin = "https://trypersonalfinance.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, PATCH, OPTIONS"
    Access-Control-Allow-Headers = "Content-Type, Authorization, X-Requested-With, Accept, Origin, X-Api-Key"
    Access-Control-Allow-Credentials = "true"
    Access-Control-Max-Age = "86400"
    Vary = "Origin"

# All API subdomain requests go to Netlify Functions
# This is the main rule that routes all API subdomain requests
[[redirects]]
  from = "https://api.trypersonalfinance.com/*"
  to = "https://trypersonalfinance.com/.netlify/functions/:splat"
  status = 200
  force = true
  [redirects.headers]
    Access-Control-Allow-Origin = "https://trypersonalfinance.com"
    Access-Control-Allow-Methods = "GET, POST, PUT, DELETE, OPTIONS"
